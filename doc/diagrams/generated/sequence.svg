th="17" x="25" y="230.7871">alt</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="189" x="87" y="229.8535">[required quantities are available]</text><polygon fill="#00BFFF" points="413,251.8398,423,255.8398,413,259.8398,417,255.8398" style="stroke:#00BFFF;stroke-width:1.0;"/><line style="stroke:#00BFFF;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="157" x2="419" y1="255.8398" y2="255.8398"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="77" x="164" y="251.0977">Queue order</text><polygon fill="#00BFFF" points="68,281.1504,58,285.1504,68,289.1504,64,285.1504" style="stroke:#00BFFF;stroke-width:1.0;"/><line style="stroke:#00BFFF;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="62" x2="151" y1="285.1504" y2="285.1504"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="45" x="74" y="280.4082">Invoice</text><!--MD5=[b07067d0da5d25144f013bebdcd6d93a]
@startuml

hide footbox

skinparam sequence {
    ArrowColor DeepSkyBlue
    LifeLineBackgroundColor lightBlue
    LifeLineBorderColor blue
    ParticipantBackgroundColor lightBlue
    ParticipantBorderColor DeepSkyBlue
    ParticipantPadding 10
}

participant Client #lightgrey
participant Ordering #lightgreen
participant Menu
participant Stock
participant Preparation as "Drink\nPreparation"

Client -> Ordering: Order
activate Ordering

Ordering -> Menu: Get recipe
activate Menu

Ordering <- - Menu
deactivate Menu

loop for each ingredient in recipe

    Ordering -> Stock: Get available quantity
    activate Stock

    Ordering <- - Stock
    deactivate Stock

end loop

alt required quantities are available

    Ordering - -> Preparation: Queue order
    activate Preparation

    Client <- - Ordering: Invoice
    deactivate Ordering

end

@enduml

